<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports.ru</title>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <!-- Left: logo + nav -->
      <div class="header-left">
        <a href="/" class="header-logo">
          <img src="images/Type=Cyrilic Full.svg" alt="Sports.ru" width="102" height="26">
        </a>
        <nav class="header-nav" id="headerNav">
          <button class="header-nav-toggle" id="headerNavToggle" aria-label="Меню">
            <img src="images/icons/menu 3.svg" alt="" width="24" height="24">
          </button>
          <ul class="header-nav-list">
            <li><a href="#" class="active">Главная</a></li>
            <li><a href="#">Новости</a></li>
            <li><a href="#">Трибуна</a></li>
            <li><a href="#">Ставки</a></li>
            <li><a href="#">Футбол</a></li>
            <li><a href="#">Фигурка</a></li>
            <li><a href="#">Баскет</a></li>
            <li><a href="#">Теннис</a></li>
            <li><a href="#">Бокс</a></li>
            <li><a href="#">Авто</a></li>
          </ul>
        </nav>
      </div>

      <!-- Right: actions -->
      <div class="header-right">
        <button class="header-btn" aria-label="Прямой эфир">
          <img src="images/icons/video 2.svg" alt="" width="24" height="24">
        </button>
        <button class="header-btn header-btn-search" aria-label="Поиск">
          <img src="images/icons/search.svg" alt="" width="24" height="24">
        </button>
        <button class="header-btn header-btn-notify" aria-label="Уведомления">
          <img src="images/icons/notification.svg" alt="" width="24" height="24">
        </button>
        <button class="header-btn header-btn-write" aria-label="Написать">
          <img src="images/icons/edit.svg" alt="" width="24" height="24">
        </button>
        <button class="header-avatar" aria-label="Профиль">
          <span class="header-avatar-circle"></span>
        </button>
      </div>
    </div>
  </header>

</body>
</html>
